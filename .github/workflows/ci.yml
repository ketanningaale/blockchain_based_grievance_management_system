name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Backend: lint + test ──────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Create stub .env for tests
        working-directory: backend
        run: |
          {
            echo "APP_ENV=test"
            echo "SECRET_KEY=ci-test-secret-key-32-chars-min!!"
            echo "ALLOWED_ORIGINS=http://localhost:3000"
            echo "BESU_RPC_URL=http://127.0.0.1:8545"
            echo "RELAY_WALLET_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
            echo "CONTRACT_ROLE_MANAGER=0x0000000000000000000000000000000000000000"
            echo "CONTRACT_GRIEVANCE_SYSTEM=0x0000000000000000000000000000000000000000"
            echo "FIREBASE_PROJECT_ID=ci-test"
            echo "FIREBASE_PRIVATE_KEY_ID=ci"
            echo 'FIREBASE_PRIVATE_KEY=-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA0Z3VS5JJcds3xHn/ygWep4e\n-----END RSA PRIVATE KEY-----\n'
            echo "FIREBASE_CLIENT_EMAIL=ci@ci.iam.gserviceaccount.com"
            echo "FIREBASE_CLIENT_ID=123456789"
            echo "FIREBASE_CLIENT_CERT_URL=https://www.googleapis.com/robot/v1/metadata/x509/ci"
            echo "INSTITUTE_EMAIL_DOMAIN=test.edu.in"
            echo "INSTITUTE_ID=institute_001"
            echo "PINATA_API_KEY=ci"
            echo "PINATA_SECRET_KEY=ci"
            echo "PINATA_GATEWAY=https://gateway.pinata.cloud"
            echo "SENDGRID_API_KEY="
            echo "SENDGRID_FROM_EMAIL=ci@test.edu.in"
            echo "SENDGRID_FROM_NAME=CI"
            echo "THRESHOLD_CHECK_INTERVAL_MINUTES=30"
          } > .env

      - name: Create stub ABI files
        # Blockchain service loads ABIs from disk; stubs prevent FileNotFoundError
        # if any code path triggers get_blockchain_service() during tests.
        working-directory: backend
        run: |
          mkdir -p app/services/abis
          echo '[]' > app/services/abis/RoleManager.json
          echo '[]' > app/services/abis/GrievanceSystem.json

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ── Frontend: TypeScript type-check ──────────────────────────────────────────
  frontend:
    name: Frontend Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        # npm install (not ci) because package-lock.json is gitignored
        run: npm install

      - name: Create stub .env.local
        working-directory: frontend
        run: |
          {
            echo "NEXT_PUBLIC_API_URL=http://localhost:8000"
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=ci-key"
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=ci.firebaseapp.com"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=ci"
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=ci.appspot.com"
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=123"
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=1:123:web:abc"
            echo "NEXT_PUBLIC_PINATA_GATEWAY=https://gateway.pinata.cloud"
          } > .env.local

      - name: Type-check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint

  # ── Solidity: compile + test ──────────────────────────────────────────────────
  solidity:
    name: Solidity Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: blockchain/package-lock.json

      - name: Install dependencies
        working-directory: blockchain
        run: npm ci

      - name: Compile contracts
        working-directory: blockchain
        run: npx hardhat compile

      - name: Run tests
        working-directory: blockchain
        run: npx hardhat test
