name: Deploy Smart Contracts

on:
  # Run manually from GitHub UI → Actions tab → "Deploy Smart Contracts" → Run workflow
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "sepolia"
        type: choice
        options:
          - sepolia

  # Also run automatically when contract source files change on main
  push:
    branches: [main]
    paths:
      - "blockchain/contracts/**"

concurrency:
  group: deploy-contracts
  cancel-in-progress: false  # Never cancel a deploy mid-flight

jobs:
  deploy:
    name: Compile & Deploy Contracts
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit updated ABIs back to the repo

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Node setup ────────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: blockchain/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install blockchain dependencies
        working-directory: blockchain
        run: npm ci

      # ── 4. Compile contracts ─────────────────────────────────────────────────
      - name: Compile contracts
        working-directory: blockchain
        run: npm run compile

      # ── 5. Run tests ─────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: blockchain
        run: npm test

      # ── 6. Derive relay wallet address from private key ───────────────────────
      # INSTITUTE_ADMIN_ADDRESS must be the relay wallet — it signs all txs and
      # needs ADMIN_ROLE so that onlyAdmin() passes.
      - name: Derive relay wallet address
        working-directory: blockchain
        env:
          RELAY_WALLET_PRIVATE_KEY: ${{ secrets.RELAY_WALLET_PRIVATE_KEY }}
        run: |
          RELAY_ADDRESS=$(node -e "
            const { ethers } = require('ethers');
            const w = new ethers.Wallet(process.env.RELAY_WALLET_PRIVATE_KEY);
            process.stdout.write(w.address);
          ")
          echo "RELAY_WALLET_ADDRESS=$RELAY_ADDRESS" >> $GITHUB_ENV
          echo "Relay wallet address: $RELAY_ADDRESS"

      # ── 7. Deploy to Sepolia ──────────────────────────────────────────────────
      - name: Deploy contracts to Sepolia
        working-directory: blockchain
        env:
          ALCHEMY_SEPOLIA_URL:     ${{ secrets.ALCHEMY_SEPOLIA_URL }}
          DEPLOYER_PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          INSTITUTE_ADMIN_ADDRESS: ${{ env.RELAY_WALLET_ADDRESS }}
          INSTITUTE_NAME:          ${{ vars.INSTITUTE_NAME || 'Demo Institute' }}
        run: npm run deploy:sepolia

      # ── 8. Export ABIs to backend ─────────────────────────────────────────────
      - name: Export ABIs to backend
        working-directory: blockchain
        run: npm run export-abis

      # ── 9. Print deployed addresses ──────────────────────────────────────────
      - name: Print deployment info
        working-directory: blockchain
        run: |
          echo "================================================"
          echo "Deployment complete. Update your Render env vars:"
          echo "================================================"
          cat deployments/sepolia.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          inst = d['institute']
          print(f\"CONTRACT_ROLE_MANAGER={inst['roleManager']}\")
          print(f\"CONTRACT_GRIEVANCE_SYSTEM={inst['grievanceSystem']}\")
          print()
          print(f\"Network:  {d['network']} (chainId: {d['chainId']})\")
          print(f\"Deployed: {d['deployedAt']}\")
          "
          echo "================================================"
          echo "Also update BESU_RPC_URL to your Alchemy Sepolia URL"
          echo "================================================"

      # ── 10. Commit updated ABIs back to repo ─────────────────────────────────
      - name: Commit updated ABIs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/app/services/abis/
          git add blockchain/deployments/
          git diff --cached --quiet || git commit -m "chore: update ABIs and deployment info after Sepolia deploy [skip ci]"
          git push
